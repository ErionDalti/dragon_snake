<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snake</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="top">
        <h1>Snake</h1>
        <div class="score" aria-live="polite">
          Score: <span id="score">0</span>
        </div>
      </header>

      <section class="board-wrap">
        <canvas id="board" width="400" height="400" aria-label="Snake game board"></canvas>
      </section>

      <section class="controls">
        <button id="restart" class="btn" type="button">Restart</button>
        <button id="pause" class="btn" type="button">Pause</button>
        <div class="hint">Use arrow keys or WASD. Space to pause.</div>
      </section>

      <section class="pad" aria-label="On-screen controls">
        <button class="pad-btn" data-dir="up" type="button">Up</button>
        <div class="pad-row">
          <button class="pad-btn" data-dir="left" type="button">Left</button>
          <button class="pad-btn" data-dir="down" type="button">Down</button>
          <button class="pad-btn" data-dir="right" type="button">Right</button>
        </div>
      </section>

      <div id="status" class="status" aria-live="polite"></div>
    </main>

    <script src="snake.js"></script>
  </body>
</html>
